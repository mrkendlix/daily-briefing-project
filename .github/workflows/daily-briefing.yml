name: Daily Briefing

on:
  schedule:
    # 10:30 UTC = 6:30 AM ET (winter/EST), 5:30 AM ET (summer/EDT)
    - cron: '30 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Load saved WHOOP token if exists
        run: |
          if [ -f .whoop_refresh_token ]; then
            echo "WHOOP_REFRESH_TOKEN_OVERRIDE=$(cat .whoop_refresh_token)" >> $GITHUB_ENV
            echo "Loaded saved refresh token from repo"
          else
            echo "No saved token file, using secret"
          fi

      - name: Generate and send briefing
        env:
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_REFRESH_TOKEN: ${{ env.WHOOP_REFRESH_TOKEN_OVERRIDE || secrets.WHOOP_REFRESH_TOKEN }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          DEFAULT_LAT: ${{ vars.DEFAULT_LAT || '40.7128' }}
          DEFAULT_LON: ${{ vars.DEFAULT_LON || '-74.0060' }}
          DEFAULT_CITY: ${{ vars.DEFAULT_CITY || 'New York City' }}
        run: python generate_briefing.py

      - name: Save new WHOOP refresh token
        if: always()
        run: |
          if [ -f .new_refresh_token ]; then
            cp .new_refresh_token .whoop_refresh_token
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .whoop_refresh_token
            git diff --cached --quiet || git commit -m "update whoop refresh token [skip ci]"
            git push
            echo "New refresh token committed to repo"
          else
            echo "No new token to save"
          fi
